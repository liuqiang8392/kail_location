name: Build Android App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 消除 Node.js 警告

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # -------- 修正 KSP 版本（如果未在仓库中直接修改） ----------
      - name: Fix KSP version
        run: |
          # 将原版本（可能是 2.3.0 或 2.0.21...）替换为兼容 Kotlin 2.2.0 的 KSP 版本
          sed -i 's/version "2.3.0"/version "2.2.0-2.0.2"/g' build.gradle.kts
          sed -i 's/version "2.0.21-1.0.27"/version "2.2.0-2.0.2"/g' build.gradle.kts
          sed -i 's/version "2.2.0-1.0.31"/version "2.2.0-2.0.2"/g' build.gradle.kts

      # -------- 确保 settings.gradle.kts 包含 google() 仓库 ----------
      - name: Ensure Google repository in settings
        run: |
          if ! grep -q "google()" settings.gradle.kts; then
            sed -i '/pluginManagement {/a \    repositories {\n        google()\n        mavenCentral()\n        gradlePluginPortal()\n    }' settings.gradle.kts
          fi

      # -------- 接受所有 Android SDK 许可证（包括 NDK 29） ----------
      - name: Accept Android SDK licenses
        run: |
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
