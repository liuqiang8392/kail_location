name: Build Android App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 自动修复 KSP 版本和仓库配置
      - name: Fix KSP configuration
        run: |
          # 1. 修正 KSP 版本号
          sed -i 's/version "2.2.0-1.0.31"/version "2.2.0-2.0.2"/g' build.gradle.kts
          
          # 2. 确保 settings.gradle.kts 中包含 google() 仓库
          if ! grep -q "google()" settings.gradle.kts; then
            sed -i '/pluginManagement {/a \    repositories {\n        google()\n        mavenCentral()\n        gradlePluginPortal()\n    }' settings.gradle.kts
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
